name: Deploy OfficeBite to Proxmox

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    # КРИТИЧНО: Решава проблема с липсващия HOME при NuGet.targets
    env:
      DOTNET_CLI_HOME: /home/runner
      HOME: /home/runner

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 🔨 Verify & Build
        run: |
          export PATH=$PATH:/usr/share/dotnet:/usr/bin
          
          # Динамично намиране на OfficeBite проекта
          PROJECT_FILE=$(find . -maxdepth 3 -iname "*OfficeBite*.csproj" | head -n 1)
          echo "🚀 Found project at: $PROJECT_FILE"
          
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ ERROR: OfficeBite.csproj not found!"
            ls -R
            exit 1
          fi

          dotnet restore "$PROJECT_FILE"
          dotnet publish "$PROJECT_FILE" -c Release -o ./publish

      - name: 🚀 Sync to Production (CT 160)
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete ./publish/ root@192.168.1.160:/var/www/officebite/

      - name: 🔄 Restart Service
        run: |
          ssh -o StrictHostKeyChecking=no root@192.168.1.160 "systemctl restart officebite.service"