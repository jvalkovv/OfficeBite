name: Deploy OfficeBite to Proxmox

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    env:
      DOTNET_CLI_HOME: /home/runner
      HOME: /home/runner

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔨 Verify, Build & Publish
        run: |
          export PATH=$PATH:/usr/share/dotnet:/usr/bin
          
          # 1. Намираме точно къде е проектът
          PROJECT_FILE=$(find . -maxdepth 4 -iname "OfficeBite.csproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "🚀 Project found in: $PROJECT_DIR"
          
          # 2. Публикуваме ВЪТРЕ в папката на проекта за сигурност
          dotnet publish "$PROJECT_FILE" -c Release -o "$PROJECT_DIR/publish"
          
          # 3. Запазваме пътя за следващата стъпка в променлива на средата
          echo "FINAL_PUBLISH_PATH=$PROJECT_DIR/publish" >> $GITHUB_ENV

      - name: 🚀 Sync to Production (CT 160)
        run: |
          # Използваме динамично намерения път от предната стъпка
          echo "📂 Syncing from: ${{ env.FINAL_PUBLISH_PATH }}"
          
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /home/runner/.ssh/id_ed25519" \
          --delete "${{ env.FINAL_PUBLISH_PATH }}/" root@192.168.1.160:/var/www/officebite/

      - name: 🔄 Restart Service
        run: |
          ssh -o StrictHostKeyChecking=no -i /home/runner/.ssh/id_ed25519 root@192.168.1.160 "systemctl restart officebite.service"
